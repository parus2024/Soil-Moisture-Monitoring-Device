    glyphs: |-
      |#~*<>!'"%/()+=,-_.:°0123456789АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЬЫЪЭЮЯABCDEFGHIJKLMNOPQRSTUVWXYZ абвгдеёжзийклмнопрстуфхцчшщьыъэюяabcdefghijklmnopqrstuvwxyz
  - file: "fonts/arial.ttf"
    id: arial_20
    size: 20
    glyphs: |-
      |#~*<>!'"%/()+=,-_.:°0123456789
  - file: "fonts/arial.ttf"
    id: arial_18
    size: 18
    glyphs: |-
      |#~*<>!'"%/()+=,-_.:°0123456789ПАРУСVНДО
  - file: "fonts/arial.ttf"
    id: arial_30
    size: 30
    glyphs: |-
      |#~*<>!'"%/()+=,-_.:°0123456789NAna

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    #address: 0x3C
    i2c_id: bus_a
    id: my_display
    rotation: 90°
    pages:
      - id: main_page
        lambda: |-
          it.print(0, 0, id(arial_18), "1");
          it.printf(0, 17, id(arial_12), TextAlign::TOP_LEFT, "%.0f--", id(alert_moisture).state);
          it.print(66, 5, id(arial_18), TextAlign::TOP_RIGHT, "%");
          it.printf(34, 0, id(arial_30), TextAlign::TOP_CENTER, "%.0f", id(soil_moisture).state);
          
          // Текущее время
          auto time = id(sntp_time).now(); // ESPTime
          it.printf(25, 29, id(arial_12), TextAlign::TOP_LEFT, "%02d:%02d", id(sntp_time).now().hour, id(sntp_time).now().minute);

          // режим период/время
          if (!id(period_time).state) {
          it.print(16, 40, id(arial_12), TextAlign::TOP_LEFT, "-период");
          it.printf(0, 40, id(arial_12), TextAlign::TOP_LEFT, "%.0f", id(period).state);
          }
          else {
          it.print(16, 40, id(arial_12), TextAlign::TOP_LEFT, "-время");

            if (id(first_event) == 1) {
                it.printf(0, 40, id(arial_12), TextAlign::TOP_LEFT, "%02d", id(time1).hour);
              } else {
                it.printf(0, 40, id(arial_12), TextAlign::TOP_LEFT, "%02d", id(time2).hour);
              }
          }

          // сигнал да/нет
          it.print(22, 51, id(arial_12), TextAlign::TOP_LEFT, "-сигнал");
          if (!id(alert_switch).state) {
          it.printf(0, 52, id(arial_12), TextAlign::TOP_LEFT, "нет");
          }
          else {
          it.print(0, 51, id(arial_12), TextAlign::TOP_LEFT, "ДА");
          }
          
          it.print(0, 62, id(arial_12), TextAlign::TOP_LEFT, "DC");
          it.printf(25, 62, id(arial_12), TextAlign::TOP_LEFT, "-%.2fV", id(battery_voltage).state);

          //it.print(0, 73, id(arial_12), TextAlign::TOP_LEFT, "сон");
          it.print(20, 73, id(arial_12), TextAlign::TOP_LEFT, "Сон на");
          it.printf(18, 84, id(arial_12), TextAlign::TOP_LEFT, id(next_sleep_duration_sensor).state.c_str());
          //if (!id(sleep_work).state) {
          //  it.printf(16, 94, id(arial_12), "(%2d)", id(countdown));
          //}else {
          //  it.print(16, 94, id(arial_12), "(OFF)");
          //}

          if (!id(sleep_work).state) {
            it.printf(0, 78, id(arial_12), "%2d", id(countdown));
          }else {
            it.print(0, 78, id(arial_12), "off");
          }

          it.print(0, 95, id(arial_12), TextAlign::TOP_LEFT, "X 2-сон/нет");
          it.print(0, 106, id(arial_12), TextAlign::TOP_LEFT, "X 3-режим");
          it.print(0, 117, id(arial_12), TextAlign::TOP_LEFT, "X 4-сигнал");
          
      - id: setting
        lambda: |-
          it.print(0, 0, id(arial_12), TextAlign::TOP_LEFT, "X 1-выйти");
          it.print(0, 20, id(arial_12), TextAlign::TOP_LEFT, "X 2-уровень");
          it.print(20, 35, id(arial_12), TextAlign::TOP_LEFT, "влаги");
          it.print(0, 50, id(arial_12), TextAlign::TOP_LEFT, "X 3-период");
          it.print(0, 65, id(arial_12), TextAlign::TOP_LEFT, "X 4-время1");
          it.print(0, 80, id(arial_12), TextAlign::TOP_LEFT, "X 5-время2");
          it.print(0, 95, id(arial_12), TextAlign::TOP_LEFT, "X 6-яркость");
      - id: period_page
        lambda: |-
          it.print(16, 10, id(arial_12), TextAlign::TOP_LEFT, "введите");
          it.print(16, 30, id(arial_12), TextAlign::TOP_LEFT, "период");
          it.print(16, 50, id(arial_12), TextAlign::TOP_LEFT, "ЧАСЫ");
          it.printf(34, 75, id(arial_30), TextAlign::TOP_CENTER, "%.0f", id(period).state);
          it.print(0, 110, id(arial_12), TextAlign::TOP_LEFT, "X 2-выйти");
      - id: moisture_page
        lambda: |-
          it.print(16, 0, id(arial_12), TextAlign::TOP_LEFT, "введите");
          it.print(16, 20, id(arial_12), TextAlign::TOP_LEFT, "уровень");
          it.print(16, 40, id(arial_12), TextAlign::TOP_LEFT, "влаги");
          it.print(16, 60, id(arial_12), TextAlign::TOP_LEFT, "сигнала");
          it.printf(34, 80, id(arial_30), TextAlign::TOP_CENTER, "%.0f", id(alert_moisture).state);
          it.print(0, 110, id(arial_12), TextAlign::TOP_LEFT, "X 2-выйти");
      - id: time1_page
        lambda: |-
          it.print(16, 0, id(arial_12), TextAlign::TOP_LEFT, "введите");
          it.print(16, 20, id(arial_12), TextAlign::TOP_LEFT, "время 1");
          it.printf(34, 50, id(arial_30), TextAlign::TOP_CENTER, "%02d", id(time1).hour);
          it.print(0, 110, id(arial_12), TextAlign::TOP_LEFT, "X 2-выйти");
      - id: time2_page
        lambda: |-
          it.print(16, 0, id(arial_12), TextAlign::TOP_LEFT, "введите");
          it.print(16, 20, id(arial_12), TextAlign::TOP_LEFT, "время 2");
          it.printf(34, 50, id(arial_30), TextAlign::TOP_CENTER, "%02d", id(time2).hour);
          it.print(0, 110, id(arial_12), TextAlign::TOP_LEFT, "X 2-выйти");
      - id: brightness_page
        lambda: |-
          it.print(16, 0, id(arial_12), TextAlign::TOP_LEFT, "введите");
          it.print(16, 20, id(arial_12), TextAlign::TOP_LEFT, "яркость");
          it.printf(34, 50, id(arial_30), TextAlign::TOP_CENTER, "%.0f", id(brightness).state);
          it.print(50, 80, id(arial_18), TextAlign::TOP_RIGHT, "%");
          it.print(0, 110, id(arial_12), TextAlign::TOP_LEFT, "X 2-выйти");
      - id: sleeping
        lambda: |-
          it.print(16, 0, id(arial_18), TextAlign::TOP_LEFT, "ДО");
          it.print(16, 20, id(arial_12), TextAlign::TOP_LEFT, "встречи!");
          it.print(16, 50, id(arial_12), TextAlign::TOP_LEFT, "Сон на");
          it.printf(16, 65, id(arial_12), TextAlign::TOP_LEFT, id(next_sleep_duration_sensor).state.c_str());
sensor:
  - platform: adc
    pin: ${batt_voltage_pin}
    name: "Voltage 18650"
    id: battery_voltage
    update_interval: 30s
    attenuation: 12db
    filters:
      - multiply: 1.5
    unit_of_measurement: "V"
    entity_category: "diagnostic"
    on_value:
      then:
        - if: # Если напряжение ниже допустимого, -тогда сигналим раз в минуту
            condition:
                - lambda: 'return (id(battery_voltage).state < 3.35 );'
            then:
              - rtttl.play: 'siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e'
              - delay: 30s
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    loop_time:
      name: "Loop Time"
  - platform: adc
    pin: ${moisture_sensor_pin}
    name: "Soil Moisture Sensor"
    id: soil_moisture_sensor
    update_interval: 1s
    attenuation: 12db

  - platform: copy # Reports the soil_moisture_sensor
    source_id: soil_moisture_sensor
    name: "Soil Moisture"
    id: soil_moisture
    accuracy_decimals: 0
    filters:
    #  - lambda: return min(max((x + 90.0) * (100.0 / 60.0), 0.0), 100.0);
    #  - lambda: return std::clamp(remap(x, -90, -30, 0, 100), 0, 100);
      - median:
          window_size: 7
          send_every: 4
          send_first_at: 1
      - calibrate_linear:
         method: exact
         datapoints:
          # Map (from sensor db) to (sensor %)
          - 1.05 -> 100.00
          - 2.82 -> 0.00
      - clamp:
          min_value: 0
          max_value: 100
          #ignore_out_of_range: true
      - round: 0
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: MOISTURE
    on_value:
      then:
        - if: # Если влажности ниже установленной, и разрешен сигнал -тогда сигналим
            condition:
              and:
                - lambda: 'return (id(soil_moisture).state < id(alert_moisture).state );'
                - switch.is_on: alert_switch
            then:
              - rtttl.play: 'Urgent:d=8,o=6,b=500:c,e,d7,c,e,a#,c,e,a,c,e,g,c,e,a,c,e,a#,c,e,d7'
number:
  - platform: template
    name: "Brightness" # Установка яркости
    id: brightness
    optimistic: true
    min_value: 0
    max_value: 100
    step: 20
    initial_value: 80
    unit_of_measurement: "%"
    restore_value: true
    mode: box
    on_value:
      then:
        lambda: |-
          id(my_display).set_contrast(x / 100.0);
  - platform: template
    name: "Period (hours)"
    id: period
    icon: mdi:timer-alert-outline
    optimistic: true
    min_value: 1.0
    max_value: 48.0 # Максимум 2 суток
    step: 1.0
    mode: box
    initial_value: 6.0 # Начальное значение
    restore_value: true
  - platform: template
    name: "Alert Moisture"
    id: alert_moisture
    icon: mdi:alert
    optimistic: true
    min_value: 1
    max_value: 99 
    step: 1
    mode: box
    unit_of_measurement: "%"
    initial_value: 50 # Начальное значение
    restore_value: true
switch:
  - platform: gpio
    name: Supply
    icon: mdi:tablet-dashboard
    id: supply_switch
    pin:
      number: GPIO6
      inverted: false
      mode:
        output: true
        pullup: true
    restore_mode: ALWAYS_ON
  - platform: template # Виртуальный выключатель сон по периоду/установленному времени
    name: 'Period⁄Time'
    icon: mdi:timer
    optimistic: true
    id: period_time
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template # Виртуальный выключатель работа/возможность сна
    name: 'Sleep⁄Work'
    icon: mdi:sleep-off
    optimistic: true
    id: sleep_work
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template # Виртуальный выключатель сигнала
    name: 'Alert No⁄Yes'
    icon: mdi:alert
    optimistic: true
    id: alert_switch
    restore_mode: RESTORE_DEFAULT_ON
deep_sleep:
  id: my_deep_sleep
  wakeup_pin_mode: INVERT_WAKEUP
  wakeup_pin:
    number: GPIO0
    allow_other_uses: true # Кнопка также пробуждает
    mode: INPUT_PULLUP
    inverted: false
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Moscow
    servers:
      - 0.ru.pool.ntp.org
      - ntp0.ntp-servers.net
      - 2.pool.ntp.org
    update_interval: 1min
    on_time_sync: 
      - lambda: |-
          id(time_received) = true;  // Устанавливаем флаг, когда время от SNTP получено
          ESP_LOGI("custom", "Time received from SNTP, flag set to TRUE");
datetime:
  - platform: template # Проверка утром
    id: time1
    type: time
    web_server:
      sorting_group_id: sorting_group_time_sun
    name: "Time1"
    icon: mdi:sort-clock-descending-outline
    optimistic: true
    initial_value: "08:00:00"
    restore_value: true
  - platform: template # Проверка вечером
    id: time2
    type: time
    web_server:
      sorting_group_id: sorting_group_time_sun
    name: Time2
    icon: mdi:sort-clock-ascending-outline
    optimistic: true
    initial_value: "20:00:00"
    restore_value: true
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0 # кнопка к gpio0 и GND
      allow_other_uses: true
      mode: INPUT_PULLUP
      inverted: true
    name: Control Button
    id: control_button
    icon: mdi:gesture-tap-button
    filters:
      - delayed_on: 10ms # Защита от дребезга
    on_press:
      - lambda: |-
          if (!id(is_touching)) {
            id(is_touching) = true;
            id(touch_start_time) = millis();
            id(long_press_active) = false;
            }
    on_release:
      - lambda: |-
          id(is_touching) = false;
          id(long_press_active) = false;
    on_multi_click:
    - timing: # Одиночное длительное нажатие для входа и выхода из настроек
        - ON for 1500ms to 3s
        - OFF for at least 0.5s
      then:
        - if:
            condition:
              display.is_displaying_page: main_page
            then:
              - display.page.show: setting
            else:
              - display.page.show: main_page
 #       - deep_sleep.enter:
 #           id: my_deep_sleep
 #           sleep_duration: !lambda 'return id(next_sleep_duration);'
    - timing: # Короткое нажатие для настроек
        - ON for at most 1s
        - OFF for at least 0.5s
      then:
        - if:
            condition:
              display.is_displaying_page: period_page
            then:
              - lambda: |-
                  // Первичное изменение (если не long press)
                  if (!id(long_press_active)) {
                    float val = id(period)->state;
                    val += 1.0;  // шаг изменения: +1 час
                    if (val < 1) val = 1;
                    if (val > 48) val = 1;
                    auto call = id(period)->make_call();
                    call.set_value(val);
                    call.perform();
                  }
            else:
              - if:
                  condition:
                    display.is_displaying_page: moisture_page
                  then:
                    - lambda: |-
                        // Первичное изменение (если не long press)
                        if (!id(long_press_active)) {
                          float val = id(alert_moisture)->state;
                          val += 1.0;  // шаг изменения: +1%
                          if (val < 1) val = 1;
                          if (val > 99) val = 1;
                          auto call = id(alert_moisture)->make_call();
                          call.set_value(val);
                          call.perform();
                        }
                  else:
                    - if:
                        condition:
                          display.is_displaying_page: brightness_page
                        then:
                          - lambda: |-
                              // Первичное изменение (если не long press)
                              if (!id(long_press_active)) {
                              float val = id(brightness)->state;
                                val += 20.0;  // шаг изменения: +20%
                                if (val < 20) val = 20;
                                if (val > 100) val = 20;
                                auto call = id(brightness)->make_call();
                                call.set_value(val);
                                call.perform();
                              }
                        else:
                          - if:
                              condition:
                                display.is_displaying_page: time1_page
                              then: # Установка значения datetime time1
                                - lambda: |-
                                    int current_hour = id(time1_hour_var);
                                    int new_hour = current_hour + 1;
                                    // Зацикливание через модульную арифметику: 0–23 часа
                                    new_hour = (new_hour + 24) % 24;
                                    id(time1_hour_var) = new_hour;
                                    auto call = id(time1)->make_call();
                                    call.set_time({
                                      .second = 0,
                                      .minute = 0,
                                      .hour = static_cast<uint8_t>(new_hour)
                                    });
                                    call.perform();
                              else:
                                - if:
                                    condition:
                                      display.is_displaying_page: time2_page
                                    then: # Установка значения datetime time1
                                      - lambda: |-
                                          int current_hour = id(time2_hour_var);
                                          int new_hour = current_hour + 1;
                                          // Зацикливание через модульную арифметику: 0–23 часа
                                          new_hour = (new_hour + 24) % 24;
                                          id(time2_hour_var) = new_hour;
                                          auto call = id(time2)->make_call();
                                          call.set_time({
                                            .second = 0,
                                            .minute = 0,
                                            .hour = static_cast<uint8_t>(new_hour)
                                          });
                                          call.perform();
    - timing: # Двойное нажатие спать\не спать
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at least 0.2s
      then:
        - if:
            condition:
              display.is_displaying_page: main_page
            then:
              - switch.toggle: sleep_work
            else:            
              #- display.page.show: moisture_page
              - if:
                  condition:
                    or:
                      - display.is_displaying_page: period_page
                      - display.is_displaying_page: moisture_page
                      - display.is_displaying_page: time1_page
                      - display.is_displaying_page: time2_page
                      - display.is_displaying_page: brightness_page
                  then:
                    - display.page.show: main_page
                  else:            
                    - display.page.show: moisture_page
    - timing: # Тройное нажатие для смены режима работы
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at least 0.2s
      then:
