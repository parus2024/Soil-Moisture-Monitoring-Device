            condition:
              display.is_displaying_page: main_page
            then:
              - switch.toggle: period_time
            else:            
              - display.page.show: period_page
    - timing: # Четверное нажатие для смены сигнала
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at least 0.2s
      then:
        - if:
            condition:
              display.is_displaying_page: main_page
            then:
              - switch.toggle: alert_switch
            else:            
              - display.page.show: time1_page
    - timing: # 5x нажатие для настройки времени 1
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at least 0.2s
      then:
        - display.page.show: time2_page
    - timing: # 6x нажатие для настройки времени 2
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at least 0.2s
      then:
        - display.page.show: brightness_page

interval:
  - interval: 7s # Запускать этот блок каждые 7 секунд
    then:
      - delay: 1s
      - lambda: |-

          // Используем сохранённую причину из on_boot 
          auto wakeup_cause = id(last_wakeup_reason);
          bool is_timer_wakeup = (wakeup_cause == ESP_SLEEP_WAKEUP_TIMER);

          // Логируем причину пробуждения (информационно, для отладки)
          if (!is_timer_wakeup) {
            ESP_LOGI("custom", "Wake-up NOT BY TIMER (cause: %d)", wakeup_cause);
          } else {
            ESP_LOGI("custom", "Wake-up BY TIMER");
          }
          // Объявляем переменную для хранения длительности сна в миллисекундах
          // Используем uint64_t, чтобы вместить большие значения (например, до 24 часов и больше)
          uint64_t sleep_duration_ms = 0;

          auto period_ms = id(period).state *3600 *1000; // переводим часы в мс

          // Проверяем состояние выключателя period_time — если выключен, то работаем с периодом
          if (!id(period_time).state) {
            // Рассчитываем время сна в миллисекундах (секунды * 1000)
            sleep_duration_ms = (uint64_t)period_ms;
          }
          // Если period_time включен — используем пользовательские установки времени datetime time1 и time2
          else {


            // Получаем текущее время из HA
            auto current_time = id(sntp_time).now();
            // Проверяем корректность
            if (current_time.timestamp < 1609459200) {
              ESP_LOGW("custom", "HA time invalid (timestamp: %ld), skipping custom time logic", current_time.timestamp);
              return;
            }
            // Теперь используем поля ESPTime напрямую
            int current_seconds = current_time.hour * 3600 + current_time.minute * 60 + current_time.second;
            // Логи для отладки
            ESP_LOGI("custom", "Current time: %04d-%02d-%02d %02d:%02d:%02d",
              current_time.year, current_time.month, current_time.day_of_month,
              current_time.hour, current_time.minute, current_time.second);
            // Переводим текущее время в секунды с начала суток
            //int current_seconds = now.hour * 3600 + now.minute * 60 + now.second;
            // Аналогично переводим времена time1 и time2 в секунды
            int time1_seconds = id(time1).hour * 3600 + id(time1).minute * 60 + id(time1).second;
            int time2_seconds = id(time2).hour * 3600 + id(time2).minute * 60 + id(time2).second;
            // Лямбда-функция для вычисления разницы во времени с учётом перехода через полночь
            auto diff = [](int from, int to) -> int {
              int d = to - from;
              if (d <= 0) d += 24 * 3600; // Если время уже прошло сегодня — считаем до завтрашнего события
              return d;
            };

            // Считаем сколько секунд осталось до time1 и до time2
            int diff_1 = diff(current_seconds, time1_seconds);
            int diff_2 = diff(current_seconds, time2_seconds);
            // Выбираем ближайшее событие (меньшее значение)
            int min_diff = diff_1 < diff_2 ? diff_1 : diff_2;

            // Записываем в глобалку первое событие
            if (diff_1 < diff_2) {
              id(first_event) = 1;
            } else {
              id(first_event) = 2;
            }

            // Рассчитываем время сна в миллисекундах
            sleep_duration_ms = (uint64_t)min_diff * 1000ULL;
          }
          // Сохраняем рассчитанную длительность сна в глобальную переменную
          id(next_sleep_duration) = sleep_duration_ms;
          // Проверка: если больше 24 часов (24 * 3600 * 1000 ms = 86400000 ms), публикуем "NaN"
          if (sleep_duration_ms > 86400000) {
            id(next_sleep_duration_sensor).publish_state("NaN");
            ESP_LOGI("custom", "Skipped publishing due to invalid time: %d ms", sleep_duration_ms);
            return;  // Выходим, не публикуем дальше
          }
          // id(next_sleep_duration_sensor).publish_state(to_string(sleep_duration_ms / 1000.0f) + " seconds"); // Публикуем состояние сенсора с длительностью сна в секундах (для визуализации в HA)
          // Публикуем состояние сенсора с длительностью сна в формате "чч:мм:сс"
          int total_seconds = static_cast<int>(sleep_duration_ms / 1000.0f);
          int hours = total_seconds / 3600;
          int minutes = (total_seconds % 3600) / 60;
          // int seconds = total_seconds % 60;

          char buffer[20];
          snprintf(buffer, sizeof(buffer), "%dч %dм", hours, minutes);
          // snprintf(buffer, sizeof(buffer), "%dh %dm %ds", hours, minutes, seconds);
          id(next_sleep_duration_sensor).publish_state(std::string(buffer));

  - interval: 2s
    then:
      - if:
          condition:
            - lambda: 'return !id(sleep_work).state;'
          then:
            - lambda: |-
                if (id(countdown) == 0) {
                  id(countdown) = 10;
                } else if (id(countdown) > 0) {
                  id(countdown)--;
                }
            - if:
                condition:
                  lambda: 'return id(countdown) == 0 && id(sntp_time).now().is_valid() && id(sntp_time).now().timestamp > 1735689600 && id(sntp_time).now().timestamp < 1893456000 && !id(sleep_work).state;'
                then:
                  - display.page.show: sleeping
                  - logger.log: "Переход в глубокий сон"
                  - delay: 2s
                  - deep_sleep.enter:
                      id: my_deep_sleep
                      sleep_duration: !lambda 'return id(next_sleep_duration);'
            - if:
                condition:
                  lambda: 'return id(countdown) == 0 && !id(time_received);'
                then:
                  - display.page.show: sleeping
                  - logger.log: "Переход в глубокий сон на период"
                  - lambda: |-
                     // Объявляем переменную для хранения длительности сна в миллисекундах
                     // Используем uint64_t, чтобы вместить большие значения (например, до 24 часов и больше)
                     uint64_t period_sleep_duration_ms = 0;
                     auto period_ms = id(period).state *3600 *1000; // переводим часы в мс

                     // Рассчитываем время сна в миллисекундах (секунды * 1000)
                     period_sleep_duration_ms = (uint64_t)period_ms;
                     // Сохраняем рассчитанную длительность сна в глобальную переменную
                     id(next_sleep_duration) = period_sleep_duration_ms;
                     // Публикуем состояние сенсора с длительностью сна в формате "чч:мм:сс"
                     int total_seconds = static_cast<int>(period_sleep_duration_ms / 1000.0f);
                     int hours = total_seconds / 3600;
                     int minutes = (total_seconds % 3600) / 60;
                     // int seconds = total_seconds % 60;

                     char buffer[20];
                     snprintf(buffer, sizeof(buffer), "%dч %dм", hours, minutes);
                     // snprintf(buffer, sizeof(buffer), "%dh %dm %ds", hours, minutes, seconds);
                     id(next_sleep_duration_sensor).publish_state(std::string(buffer));
                  - delay: 3s
                  - deep_sleep.enter:
                      id: my_deep_sleep
                      sleep_duration: !lambda 'return id(next_sleep_duration);'
# Interval для запуска long press (после 1s)
  - interval: 200ms
    then:
      - lambda: |-
          if (id(is_touching) && !id(long_press_active) && (millis() - id(touch_start_time) > 1000)) {
            id(long_press_active) = true;
          }
  # Interval для повторения действия (каждые 500ms, пока кнопка нажата и на нужной странице)
  - interval: 300ms
    then:
      - lambda: |-
          auto active_page = id(my_display).get_active_page();
          if (id(long_press_active) && id(is_touching) && (active_page == id(period_page))) {
            float val = id(period)->state;
            val += 1.0;  // шаг изменения: +1 час
            if (val < 1) val = 1;
            if (val > 48) val = 48;
            auto call = id(period)->make_call();
            call.set_value(val);
            call.perform();
          }
          if (id(long_press_active) && id(is_touching) && (active_page == id(moisture_page))) {
            float val = id(alert_moisture)->state;
            val += 1.0;  // шаг изменения: +1 %
            if (val < 1) val = 1;
            if (val > 99) val = 99;
            auto call = id(alert_moisture)->make_call();
            call.set_value(val);
            call.perform();
          }
